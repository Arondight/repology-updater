# openKylin official archive

# openKylin 1.0 (yangtze)
- name: openkylin_1_0
  type: repository
  desc: openKylin 1.0 (yangtze)
  statsgroup: Debian+derivs
  family: debuntu
  ruleset: [ debuntu, openkylin ]
  color: '2E8B57'
  minpackages: 2000
  sources:
    {% for sub in ['main', 'cross', 'pty'] %}
    - name: {{sub}}
      fetcher:
        class: FileFetcher
        url: 'https://archive.openkylin.top/openkylin/dists/yangtze/{{sub}}/source/Sources.gz'
        compression: gz
      parser:
        class: DebianSourcesParser
      subrepo: {{sub}}
    {% endfor %}
  repolinks:
    - desc: openKylin official website
      url: https://www.openkylin.top/
    - desc: official package archive
      url: https://archive.openkylin.top/
  packagelinks:
    - type: PACKAGE_SOURCES
      url: 'https://gitee.com/openkylin/{srcname}'
  groups: [ all, production, openkylin ]

